<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏦 MyBank - Banques & Clients</title>
    <style>
        /* (garde exactement le même style que la version moderne que tu avais, je ne le répète pas pour la longueur. Reprends le style du précédent formulaire.html moderne) */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, 'Segoe UI', 'Inter', sans-serif; }
        body { background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%); min-height: 100vh; padding: 2rem 1rem; }
        .app-container { max-width: 1300px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 2rem; }
        .header h1 { font-size: 2.2rem; background: linear-gradient(135deg, #1f3b4c, #2c7da0); background-clip: text; -webkit-background-clip: text; color: transparent; }
        .tabs { display: flex; gap: 0.8rem; justify-content: center; margin-bottom: 2rem; flex-wrap: wrap; }
        .tab { background: rgba(255,255,255,0.7); backdrop-filter: blur(4px); border: none; padding: 0.8rem 1.8rem; border-radius: 60px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .tab.active { background: #2c7da0; color: white; box-shadow: 0 8px 20px rgba(44,125,160,0.3); }
        .card { background: white; border-radius: 28px; padding: 1.8rem; margin-bottom: 2rem; box-shadow: 0 20px 35px -12px rgba(0,0,0,0.15); }
        input, select, button { border-radius: 60px; padding: 12px 18px; border: 1px solid #e2e8f0; background: #fefefe; }
        button { background: #2c7da0; color: white; font-weight: 600; cursor: pointer; }
        .btn-success { background: #2c9e6b; }
        .btn-danger { background: #e25c5c; }
        .flex-row { display: flex; gap: 1rem; flex-wrap: wrap; align-items: flex-end; }
        .user-item, .bank-item { background: #f9fafc; border-radius: 80px; padding: 0.8rem 1.5rem; margin-bottom: 0.8rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .success { background: #d9f0e3; color: #1f6e43; padding: 10px 18px; border-radius: 80px; margin-top: 1rem; }
        .error { background: #ffe3e3; color: #b33; padding: 10px 18px; border-radius: 80px; margin-top: 1rem; }
        .tab-panel { display: none; }
        .tab-panel.active { display: block; }
        @media (max-width: 700px) { .user-item, .bank-item { flex-direction: column; align-items: flex-start; } }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <h1>🏦 MyBank · Multibanques</h1>
        <p>Gérez les banques, les clients et les transactions par banque</p>
    </div>
    <div class="tabs">
        <button class="tab active" data-tab="banks">🏦 Banques</button>
        <button class="tab" data-tab="users">👥 Clients</button>
        <button class="tab" data-tab="transactions">💸 Transactions</button>
        <button class="tab" data-tab="history">📊 Historique</button>
    </div>

    <!-- PANEL BANQUES -->
    <div id="panel-banks" class="tab-panel active">
        <div class="card">
            <h2>➕ Créer une banque</h2>
            <div class="flex-row">
                <input type="text" id="bankName" placeholder="Nom de la banque" style="flex:2">
                <input type="text" id="bankCode" placeholder="Code unique ex: CT001" style="flex:1">
                <button id="createBankBtn">✨ Créer</button>
            </div>
            <div id="bankMsg"></div>
        </div>
        <div class="card">
            <h2>📋 Liste des banques</h2>
            <button id="refreshBanksBtn">⟳ Actualiser</button>
            <div id="banksList">⏳ Chargement...</div>
        </div>
    </div>

    <!-- PANEL CLIENTS -->
    <div id="panel-users" class="tab-panel">
        <div class="card">
            <h2>➕ Nouveau client</h2>
            <div class="flex-row">
                <input type="text" id="fullname" placeholder="Nom" style="flex:2">
                <input type="email" id="emailUser" placeholder="Email" style="flex:2">
                <input type="number" id="initBalance" placeholder="Solde initial" step="0.01" style="flex:1">
                <select id="userBankId" style="flex:1"></select>
                <button id="createUserBtn">✨ Créer</button>
            </div>
            <div id="userFormMsg"></div>
        </div>
        <div class="card">
            <h2>👥 Clients</h2>
            <button id="refreshUsersBtn">⟳ Actualiser</button>
            <div id="usersListContainer"></div>
        </div>
    </div>

    <!-- PANEL TRANSACTIONS (identique à avant, sauf que les listes déroulantes ne proposent que des clients de la même banque lors d'un virement) -->
    <div id="panel-transactions" class="tab-panel">
        <div class="card">
            <h2>💰 Opérations</h2>
            <div class="transaction-form">
                <h3>📥 Dépôt</h3>
                <div class="flex-row">
                    <select id="depositSelect"></select>
                    <input type="number" id="depositAmount" placeholder="Montant">
                    <button id="doDepositBtn" class="btn-success">Déposer</button>
                </div>
            </div>
            <div class="transaction-form">
                <h3>📤 Retrait</h3>
                <div class="flex-row">
                    <select id="withdrawSelect"></select>
                    <input type="number" id="withdrawAmount" placeholder="Montant">
                    <button id="doWithdrawBtn" class="btn-danger">Retirer</button>
                </div>
            </div>
            <div class="transaction-form">
                <h3>🔄 Virement</h3>
                <div class="flex-row">
                    <select id="transferFromSelect"></select>
                    <span>→</span>
                    <select id="transferToSelect"></select>
                    <input type="number" id="transferAmount" placeholder="Montant">
                    <button id="doTransferBtn">Transférer</button>
                </div>
            </div>
            <div id="transactionFeedback"></div>
        </div>
    </div>

    <!-- PANEL HISTORIQUE -->
    <div id="panel-history" class="tab-panel">
        <div class="card">
            <h2>📜 Historique</h2>
            <div class="flex-row">
                <select id="historyUserSelect"></select>
                <button id="loadHistoryBtn">📋 Afficher</button>
            </div>
            <div id="historyDisplay">🕊️ Sélectionnez un client</div>
        </div>
    </div>
</div>

<!-- Modale édition utilisateur (ajout du champ banque) -->
<div id="editModal" style="display:none; position:fixed; top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5); align-items:center;justify-content:center;z-index:1000;">
    <div style="background:white; border-radius:32px; max-width:450px; width:90%; padding:2rem;">
        <h3>✏️ Modifier client</h3>
        <input type="text" id="editName" placeholder="Nom" style="width:100%"><br>
        <input type="email" id="editEmail" placeholder="Email" style="width:100%"><br>
        <input type="number" id="editBalance" placeholder="Solde" step="0.01" style="width:100%"><br>
        <select id="editBankId" style="width:100%"></select><br>
        <div style="display:flex; gap:10px; justify-content:flex-end;">
            <button id="closeModalBtn">Annuler</button>
            <button id="saveEditBtn">Sauvegarder</button>
        </div>
        <div id="editFeed"></div>
    </div>
</div>

<script>
    const BASE = window.location.origin;
    const API_USERS = `${BASE}/api/users`;
    const API_BANKS = `${BASE}/api/banks`;

    let allUsers = [];
    let allBanks = [];

    // ========== Fonctions utilitaires ==========
    async function fetchJson(url, options = {}) {
        const res = await fetch(url, options);
        if (!res.ok) throw new Error(await res.text());
        return res.json();
    }

    // ========== Banques ==========
    async function loadBanks() {
        try {
            const data = await fetchJson(API_BANKS);
            allBanks = data.banks || [];
            renderBanks();
            populateBankSelects();
        } catch (e) { console.error(e); document.getElementById('banksList').innerHTML = '<div class="error">Erreur chargement banques</div>'; }
    }
    function renderBanks() {
        const container = document.getElementById('banksList');
        if (!allBanks.length) { container.innerHTML = '<p>Aucune banque. Créez-en une.</p>'; return; }
        let html = '';
        allBanks.forEach(b => {
            html += `<div class="bank-item">
                        <div><strong>${escapeHtml(b.name)}</strong> (${b.code})<br><small>ID ${b.id}</small></div>
                        <div>
                            <button onclick="editBank(${b.id})" style="background:#ffc107;">✏️</button>
                            <button onclick="deleteBank(${b.id})" class="btn-danger">🗑️</button>
                        </div>
                    </div>`;
        });
        container.innerHTML = html;
    }
    async function createBank() {
        const name = document.getElementById('bankName').value.trim();
        const code = document.getElementById('bankCode').value.trim();
        if (!name || !code) { showBankMsg('Nom et code requis', 'error'); return; }
        try {
            await fetchJson(API_BANKS, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({name,code}) });
            showBankMsg('Banque créée', 'success');
            document.getElementById('bankName').value = '';
            document.getElementById('bankCode').value = '';
            await loadBanks();
        } catch(e) { showBankMsg(`Erreur: ${e.message}`, 'error'); }
    }
    function showBankMsg(msg, type) { const d = document.getElementById('bankMsg'); d.innerHTML = `<div class="${type}">${msg}</div>`; setTimeout(()=>d.innerHTML='',3000); }
    async function deleteBank(id) {
        if(!confirm('Supprimer cette banque ?')) return;
        try {
            await fetchJson(`${API_BANKS}/${id}`, { method:'DELETE' });
            await loadBanks();
            await loadUsers(); // car les utilisateurs perdent leur banque? (On laissera null)
        } catch(e) { alert('Erreur suppression'); }
    }
    function editBank(id) { alert('Modification de banque à implémenter si besoin'); } // version simplifiée

    // ========== Clients ==========
    async function loadUsers() {
        try {
            const data = await fetchJson(API_USERS);
            allUsers = data.users || [];
            renderUsers();
            populateUserSelects();
        } catch(e) { console.error(e); }
    }
    function renderUsers() {
        const container = document.getElementById('usersListContainer');
        if (!allUsers.length) { container.innerHTML = '<p>Aucun client.</p>'; return; }
        let html = '';
        allUsers.forEach(u => {
            const bankName = allBanks.find(b => b.id === u.bankId)?.name || 'Aucune banque';
            html += `<div class="user-item">
                        <div><strong>${escapeHtml(u.name)}</strong><br>
                        📧 ${escapeHtml(u.email)} | 💰 ${u.balance} € | 🏦 ${bankName}<br>
                        <small>ID ${u.id}</small></div>
                        <div>
                            <button onclick="openEditUser(${u.id})" style="background:#ffc107;">✏️</button>
                            <button onclick="deleteUser(${u.id})" class="btn-danger">🗑️</button>
                        </div>
                    </div>`;
        });
        container.innerHTML = html;
    }
    function populateBankSelects() {
        const selects = ['userBankId', 'editBankId'];
        selects.forEach(id => {
            const sel = document.getElementById(id);
            if (!sel) return;
            sel.innerHTML = '<option value="">-- Aucune banque --</option>';
            allBanks.forEach(b => { sel.innerHTML += `<option value="${b.id}">${b.name} (${b.code})</option>`; });
        });
    }
    async function createUser() {
        const name = document.getElementById('fullname').value.trim();
        const email = document.getElementById('emailUser').value.trim();
        const balance = parseFloat(document.getElementById('initBalance').value) || 0;
        const bankId = document.getElementById('userBankId').value;
        if (!name || !email) return showUserMsg('Nom et email requis', 'error');
        try {
            await fetchJson(API_USERS, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({name, email, balance, bankId: bankId || null}) });
            showUserMsg('Client créé', 'success');
            document.getElementById('fullname').value = '';
            document.getElementById('emailUser').value = '';
            document.getElementById('initBalance').value = '';
            await loadUsers();
        } catch(e) { showUserMsg(`Erreur: ${e.message}`, 'error'); }
    }
    function showUserMsg(msg, type) { const d = document.getElementById('userFormMsg'); d.innerHTML = `<div class="${type}">${msg}</div>`; setTimeout(()=>d.innerHTML='',3000); }
    async function deleteUser(id) {
        if(!confirm('Supprimer ce client ?')) return;
        try {
            await fetchJson(`${API_USERS}/${id}`, { method:'DELETE' });
            await loadUsers();
        } catch(e) { alert('Erreur suppression'); }
    }
    let currentEditId = null;
    function openEditUser(id) {
        const user = allUsers.find(u => u.id === id);
        if(!user) return;
        currentEditId = id;
        document.getElementById('editName').value = user.name;
        document.getElementById('editEmail').value = user.email;
        document.getElementById('editBalance').value = user.balance;
        document.getElementById('editBankId').value = user.bankId || '';
        document.getElementById('editModal').style.display = 'flex';
    }
    async function saveUserEdit() {
        if(!currentEditId) return;
        const payload = {
            name: document.getElementById('editName').value.trim(),
            email: document.getElementById('editEmail').value.trim(),
            balance: parseFloat(document.getElementById('editBalance').value) || 0,
            bankId: document.getElementById('editBankId').value || null
        };
        if(!payload.name || !payload.email) { alert('Nom et email requis'); return; }
        try {
            await fetchJson(`${API_USERS}/${currentEditId}`, { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload) });
            document.getElementById('editModal').style.display = 'none';
            await loadUsers();
        } catch(e) { alert(`Erreur: ${e.message}`); }
    }

    // ========== Transactions (dépôt, retrait, virement) avec vérification même banque côté backend ==========
    function populateUserSelects() {
        const selects = ['depositSelect', 'withdrawSelect', 'transferFromSelect', 'transferToSelect', 'historyUserSelect'];
        selects.forEach(id => {
            const sel = document.getElementById(id);
            if (!sel) return;
            sel.innerHTML = '<option value="">-- Choisir --</option>';
            allUsers.forEach(u => {
                const bankName = allBanks.find(b => b.id === u.bankId)?.name || 'sans banque';
                sel.innerHTML += `<option value="${u.id}">${escapeHtml(u.name)} (${u.balance} €) - ${bankName}</option>`;
            });
        });
    }
    async function deposit() {
        const userId = document.getElementById('depositSelect').value;
        const amount = parseFloat(document.getElementById('depositAmount').value);
        if(!userId || isNaN(amount) || amount<=0) return showTxMsg('Sélectionnez un client et un montant valide', 'error');
        try {
            const res = await fetchJson(`${API_USERS}/${userId}/deposit`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({amount}) });
            showTxMsg(`Dépôt effectué, nouveau solde ${res.user.balance} €`, 'success');
            document.getElementById('depositAmount').value = '';
            await loadUsers();
        } catch(e) { showTxMsg(`Erreur: ${e.message}`, 'error'); }
    }
    async function withdraw() {
        const userId = document.getElementById('withdrawSelect').value;
        const amount = parseFloat(document.getElementById('withdrawAmount').value);
        if(!userId || isNaN(amount) || amount<=0) return showTxMsg('Sélectionnez un client et montant valide', 'error');
        try {
            const res = await fetchJson(`${API_USERS}/${userId}/withdraw`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({amount}) });
            showTxMsg(`Retrait effectué, nouveau solde ${res.user.balance} €`, 'success');
            document.getElementById('withdrawAmount').value = '';
            await loadUsers();
        } catch(e) { showTxMsg(`Erreur: ${e.message}`, 'error'); }
    }
    async function transfer() {
        const fromId = document.getElementById('transferFromSelect').value;
        const toId = document.getElementById('transferToSelect').value;
        const amount = parseFloat(document.getElementById('transferAmount').value);
        if(!fromId || !toId || isNaN(amount) || amount<=0) return showTxMsg('Remplissez tous les champs', 'error');
        if(fromId === toId) return showTxMsg('Virement à soi-même interdit', 'error');
        try {
            await fetchJson(`${BASE}/api/transfers`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ fromUserId: fromId, toUserId: toId, amount }) });
            showTxMsg(`Virement de ${amount} € réussi`, 'success');
            document.getElementById('transferAmount').value = '';
            await loadUsers();
        } catch(e) { showTxMsg(`Erreur: ${e.message}`, 'error'); }
    }
    function showTxMsg(msg, type) { const d = document.getElementById('transactionFeedback'); d.innerHTML = `<div class="${type}">${msg}</div>`; setTimeout(()=>d.innerHTML='',3000); }

    // ========== Historique ==========
    async function loadHistory() {
        const userId = document.getElementById('historyUserSelect').value;
        if(!userId) return document.getElementById('historyDisplay').innerHTML = '<div>Choisissez un client</div>';
        try {
            const data = await fetchJson(`${API_USERS}/${userId}/history`);
            if(!data.history.length) { document.getElementById('historyDisplay').innerHTML = '<div>Aucune transaction</div>'; return; }
            let html = `<h4>${escapeHtml(data.userName)}</h4>`;
            data.history.forEach(t => {
                const date = new Date(t.date).toLocaleString();
                let direction = t.type === 'deposit' ? '💰 Dépôt' : (t.type === 'withdraw' ? '💸 Retrait' : `🔄 Virement`);
                html += `<div style="border-left:4px solid #2c7da0; padding:12px; margin-bottom:12px; background:#f9f9ff; border-radius:20px;">
                            <strong>${direction}</strong> — ${t.amount} €<br><small>${date}</small><br><span style="font-size:0.8rem;">${t.description || ''}</span>
                         </div>`;
            });
            document.getElementById('historyDisplay').innerHTML = html;
        } catch(e) { document.getElementById('historyDisplay').innerHTML = `<div class="error">Erreur: ${e.message}</div>`; }
    }

    // ========== Onglets ==========
    function activateTab(tabId) {
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        document.getElementById(`panel-${tabId}`).classList.add('active');
        document.querySelectorAll('.tab').forEach(btn => btn.classList.remove('active'));
        document.querySelector(`.tab[data-tab="${tabId}"]`).classList.add('active');
        if (tabId === 'banks') loadBanks();
        if (tabId === 'users') loadUsers();
        if (tabId === 'transactions') loadUsers().then(() => populateUserSelects());
        if (tabId === 'history') loadUsers().then(() => populateUserSelects());
    }
    document.querySelectorAll('.tab').forEach(btn => {
        btn.addEventListener('click', () => activateTab(btn.getAttribute('data-tab')));
    });

    // ========== Événements ==========
    document.getElementById('createBankBtn')?.addEventListener('click', createBank);
    document.getElementById('refreshBanksBtn')?.addEventListener('click', loadBanks);
    document.getElementById('createUserBtn')?.addEventListener('click', createUser);
    document.getElementById('refreshUsersBtn')?.addEventListener('click', loadUsers);
    document.getElementById('doDepositBtn')?.addEventListener('click', deposit);
    document.getElementById('doWithdrawBtn')?.addEventListener('click', withdraw);
    document.getElementById('doTransferBtn')?.addEventListener('click', transfer);
    document.getElementById('loadHistoryBtn')?.addEventListener('click', loadHistory);
    document.getElementById('closeModalBtn')?.addEventListener('click', () => document.getElementById('editModal').style.display = 'none');
    document.getElementById('saveEditBtn')?.addEventListener('click', saveUserEdit);

    function escapeHtml(str) { return str.replace(/[&<>]/g, m => m==='&'?'&amp;': m==='<'?'&lt;': '&gt;'); }

    // Initialisation
    loadBanks().then(() => loadUsers());
</script>
</body>
</html>
