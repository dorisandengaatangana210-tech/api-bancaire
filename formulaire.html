<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>🏦 MyBank - Gestion de comptes</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        /* Conteneur principal */
        .app-container {
            max-width: 1300px;
            margin: 0 auto;
        }

        /* En‑tête */
        .header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .header h1 {
            font-size: 2.2rem;
            background: linear-gradient(135deg, #1f3b4c, #2c7da0);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }
        .header p {
            color: #2c3e50;
            margin-top: 0.5rem;
            font-weight: 500;
        }

        /* Grille d'onglets */
        .tabs {
            display: flex;
            gap: 0.8rem;
            justify-content: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }
        .tab {
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(4px);
            border: none;
            padding: 0.8rem 1.8rem;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: 600;
            color: #1e4663;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .tab:hover {
            background: white;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }
        .tab.active {
            background: #2c7da0;
            color: white;
            box-shadow: 0 8px 20px rgba(44,125,160,0.3);
        }

        /* Cartes */
        .card {
            background: white;
            border-radius: 28px;
            padding: 1.8rem;
            margin-bottom: 2rem;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.15);
            transition: transform 0.2s;
        }
        .card:hover {
            transform: translateY(-2px);
        }

        /* Formulaires */
        input, select, button {
            border-radius: 60px;
            padding: 12px 18px;
            font-size: 0.95rem;
            border: 1px solid #e2e8f0;
            transition: all 0.2s;
            background: #fefefe;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #2c7da0;
            box-shadow: 0 0 0 3px rgba(44,125,160,0.2);
        }
        button {
            background: #2c7da0;
            color: white;
            border: none;
            font-weight: 600;
            cursor: pointer;
            padding: 12px 24px;
        }
        button:hover {
            background: #1f5e7a;
            transform: scale(0.98);
        }
        .btn-success {
            background: #2c9e6b;
        }
        .btn-success:hover {
            background: #1f7a53;
        }
        .btn-danger {
            background: #e25c5c;
        }
        .btn-danger:hover {
            background: #c13b3b;
        }

        /* Layout interne */
        .form-group {
            margin-bottom: 1rem;
        }
        label {
            font-weight: 600;
            color: #1e4663;
            margin-bottom: 0.3rem;
            display: block;
        }
        .flex-row {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            align-items: flex-end;
        }

        /* Liste utilisateurs */
        .user-item {
            background: #f9fafc;
            border-radius: 80px;
            padding: 0.8rem 1.5rem;
            margin-bottom: 0.8rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            transition: 0.1s;
            border: 1px solid #edf2f7;
        }
        .user-info strong {
            font-size: 1.1rem;
            color: #0b2b3b;
        }
        .user-actions {
            display: flex;
            gap: 0.6rem;
        }
        .user-actions button {
            padding: 6px 16px;
            font-size: 0.8rem;
        }

        /* Messages */
        .success {
            background: #d9f0e3;
            color: #1f6e43;
            padding: 10px 18px;
            border-radius: 80px;
            margin-top: 1rem;
        }
        .error {
            background: #ffe3e3;
            color: #b33;
            padding: 10px 18px;
            border-radius: 80px;
            margin-top: 1rem;
        }

        /* Bloc transaction */
        .transaction-form {
            background: #f8fafd;
            border-radius: 24px;
            padding: 1.5rem;
            margin-bottom: 1.2rem;
            border: 1px solid #eef2f8;
        }

        /* Responsive */
        @media (max-width: 700px) {
            .card {
                padding: 1.2rem;
            }
            .user-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 0.8rem;
                border-radius: 24px;
            }
            .tab {
                padding: 0.5rem 1.2rem;
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <h1>🏦 MyBank · Gestion bancaire</h1>
        <p>Comptes, dépôts, retraits, virements et historique</p>
    </div>

    <!-- Onglets -->
    <div class="tabs">
        <button class="tab active" data-tab="users">👥 Utilisateurs</button>
        <button class="tab" data-tab="transactions">💸 Transactions</button>
        <button class="tab" data-tab="history">📊 Historique</button>
    </div>

    <!-- PANEL UTILISATEURS -->
    <div id="panel-users" class="tab-panel active">
        <div class="card">
            <h2>➕ Créer un nouveau compte</h2>
            <div class="flex-row">
                <div style="flex:2"><input type="text" id="fullname" placeholder="Nom complet ex: Sophie Martin"></div>
                <div style="flex:2"><input type="email" id="emailUser" placeholder="Email ex: sophie@bank.com"></div>
                <div style="flex:1"><input type="number" id="initBalance" placeholder="Solde initial (€)" step="0.01"></div>
                <div><button id="createUserBtn" style="background:#2c7da0;">✨ Créer</button></div>
            </div>
            <div id="userFormMsg"></div>
        </div>

        <div class="card">
            <h2>📋 Tous les comptes</h2>
            <button id="refreshUsersBtn" style="margin-bottom: 1rem;">⟳ Actualiser</button>
            <div id="usersListContainer">⏳ Chargement...</div>
        </div>
    </div>

    <!-- PANEL TRANSACTIONS -->
    <div id="panel-transactions" class="tab-panel">
        <div class="card">
            <h2>💰 Opérations</h2>

            <!-- Dépôt -->
            <div class="transaction-form">
                <h3>📥 Dépôt</h3>
                <div class="flex-row">
                    <select id="depositSelect" style="flex:2"></select>
                    <input type="number" id="depositAmount" placeholder="Montant (€)" step="0.01" style="flex:1">
                    <button id="doDepositBtn" class="btn-success">Déposer</button>
                </div>
            </div>

            <!-- Retrait -->
            <div class="transaction-form">
                <h3>📤 Retrait</h3>
                <div class="flex-row">
                    <select id="withdrawSelect" style="flex:2"></select>
                    <input type="number" id="withdrawAmount" placeholder="Montant (€)" step="0.01" style="flex:1">
                    <button id="doWithdrawBtn" class="btn-danger">Retirer</button>
                </div>
            </div>

            <!-- Virement -->
            <div class="transaction-form">
                <h3>🔄 Virement entre comptes</h3>
                <div class="flex-row">
                    <select id="transferFromSelect" style="flex:2"></select>
                    <span>→</span>
                    <select id="transferToSelect" style="flex:2"></select>
                    <input type="number" id="transferAmount" placeholder="Montant" step="0.01" style="flex:1">
                    <button id="doTransferBtn">Transférer</button>
                </div>
            </div>
            <div id="transactionFeedback"></div>
        </div>
    </div>

    <!-- PANEL HISTORIQUE -->
    <div id="panel-history" class="tab-panel">
        <div class="card">
            <h2>📜 Historique des mouvements</h2>
            <div class="flex-row">
                <select id="historyUserSelect" style="flex:2"></select>
                <button id="loadHistoryBtn">📋 Afficher</button>
            </div>
            <div id="historyDisplay" style="margin-top: 1.5rem;">🕊️ Sélectionnez un utilisateur</div>
        </div>
    </div>
</div>

<!-- Modale pour éditer un utilisateur -->
<div id="editModal" style="display:none; position:fixed; top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5); align-items:center;justify-content:center;z-index:1000;">
    <div style="background:white; border-radius:32px; max-width:450px; width:90%; padding:2rem;">
        <h3>✏️ Modifier le compte</h3>
        <input type="text" id="editName" placeholder="Nom" style="width:100%; margin:10px 0;"><br>
        <input type="email" id="editEmail" placeholder="Email" style="width:100%; margin:10px 0;"><br>
        <input type="number" id="editBalance" placeholder="Solde (€)" step="0.01" style="width:100%; margin:10px 0;"><br>
        <div style="display:flex; gap:10px; justify-content:flex-end;">
            <button id="closeModalBtn">Annuler</button>
            <button id="saveEditBtn" style="background:#2c7da0;">Sauvegarder</button>
        </div>
        <div id="editFeed"></div>
    </div>
</div>

<script>
    // ---------- CONFIGURATION ----------
    const BASE = window.location.origin;
    const API_USERS = `${BASE}/api/users`;

    let allUsers = [];      // stockage local

    // ---------- UTILS ----------
    async function apiFetch(url, options = {}) {
        const res = await fetch(url, options);
        let json;
        try { json = await res.json(); } catch(e) { json = {}; }
        if (!res.ok) throw new Error(json.message || `HTTP ${res.status}`);
        return json;
    }

    function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

    async function loadUsersList() {
        try {
            const data = await fetch(API_USERS).then(r=>r.json());
            if(data.success) {
                allUsers = data.users || [];
                renderUserList();
                populateUserSelects(); // pour les selects des transactions / historique
                return allUsers;
            } else throw new Error("Format invalide");
        } catch(e) {
            document.getElementById('usersListContainer').innerHTML = `<div class="error">❌ Erreur chargement utilisateurs: ${e.message}</div>`;
            return [];
        }
    }

    function renderUserList() {
        const container = document.getElementById('usersListContainer');
        if(!allUsers.length) { container.innerHTML = '<p>Aucun utilisateur. Créez-en un !</p>'; return; }
        let html = '';
        allUsers.forEach(u => {
            html += `
                <div class="user-item">
                    <div class="user-info">
                        <strong>${escapeHtml(u.name)}</strong><br>
                        <small>📧 ${escapeHtml(u.email)} | 💰 ${u.balance} € | ID ${u.id}</small>
                    </div>
                    <div class="user-actions">
                        <button onclick="openEditUser(${u.id})" style="background:#ffc107; color:#2c2c2c;">✏️ Modifier</button>
                        <button onclick="deleteUserById(${u.id})" class="btn-danger">🗑️ Supprimer</button>
                    </div>
                </div>
            `;
        });
        container.innerHTML = html;
    }

    function populateUserSelects() {
        const selects = ['depositSelect','withdrawSelect','transferFromSelect','transferToSelect','historyUserSelect'];
        selects.forEach(id => {
            const sel = document.getElementById(id);
            if(!sel) return;
            sel.innerHTML = '<option value="">-- Choisir un compte --</option>';
            allUsers.forEach(u => {
                sel.innerHTML += `<option value="${u.id}">${escapeHtml(u.name)} (${u.balance} €)</option>`;
            });
        });
    }

    // Création utilisateur
    async function createUser() {
        const name = document.getElementById('fullname').value.trim();
        const email = document.getElementById('emailUser').value.trim();
        const balance = parseFloat(document.getElementById('initBalance').value) || 0;
        if(!name || !email) {
            showUserMsg('⚠️ Nom et email requis', 'error');
            return;
        }
        try {
            const res = await apiFetch(API_USERS, {
                method:'POST',
                headers:{'Content-Type':'application/json'},
                body: JSON.stringify({name, email, balance})
            });
            if(res.success) {
                showUserMsg('✅ Compte créé avec succès', 'success');
                document.getElementById('fullname').value = '';
                document.getElementById('emailUser').value = '';
                document.getElementById('initBalance').value = '';
                await loadUsersList();
            } else throw new Error(res.message);
        } catch(e) { showUserMsg(`❌ Erreur: ${e.message}`, 'error'); }
    }

    function showUserMsg(msg, type) { const div = document.getElementById('userFormMsg'); div.innerHTML = `<div class="${type}">${msg}</div>`; setTimeout(()=>div.innerHTML='',3000); }
    function showTxMsg(msg, type) { const div = document.getElementById('transactionFeedback'); div.innerHTML = `<div class="${type}">${msg}</div>`; setTimeout(()=>div.innerHTML='',3000); }

    // Dépôt
    async function deposit() {
        const userId = document.getElementById('depositSelect').value;
        const amount = parseFloat(document.getElementById('depositAmount').value);
        if(!userId || isNaN(amount) || amount<=0) { showTxMsg('Sélectionnez un compte et montant valide', 'error'); return; }
        try {
            const res = await apiFetch(`${API_USERS}/${userId}/deposit`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({amount}) });
            if(res.success) {
                showTxMsg(`✅ Dépôt effectué, nouveau solde ${res.user.balance} €`, 'success');
                document.getElementById('depositAmount').value = '';
                await loadUsersList();
            } else throw new Error(res.message);
        } catch(e) { showTxMsg(`Erreur dépôt: ${e.message}`, 'error'); }
    }

    async function withdraw() {
        const userId = document.getElementById('withdrawSelect').value;
        const amount = parseFloat(document.getElementById('withdrawAmount').value);
        if(!userId || isNaN(amount) || amount<=0) { showTxMsg('Sélection et montant valide', 'error'); return; }
        try {
            const res = await apiFetch(`${API_USERS}/${userId}/withdraw`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({amount}) });
            if(res.success) {
                showTxMsg(`✅ Retrait effectué, nouveau solde ${res.user.balance} €`, 'success');
                document.getElementById('withdrawAmount').value = '';
                await loadUsersList();
            } else throw new Error(res.message);
        } catch(e) { showTxMsg(`Erreur retrait: ${e.message}`, 'error'); }
    }

    async function transfer() {
        const fromId = document.getElementById('transferFromSelect').value;
        const toId = document.getElementById('transferToSelect').value;
        const amount = parseFloat(document.getElementById('transferAmount').value);
        if(!fromId || !toId || isNaN(amount) || amount<=0) { showTxMsg('Remplissez tous les champs', 'error'); return; }
        if(fromId === toId) { showTxMsg('Impossible de se virer à soi-même', 'error'); return; }
        try {
            const res = await apiFetch(`${BASE}/api/transfers`, {
                method:'POST',
                headers:{'Content-Type':'application/json'},
                body: JSON.stringify({ fromUserId: fromId, toUserId: toId, amount })
            });
            if(res.success) {
                showTxMsg(`✅ Virement de ${amount} € réussi`, 'success');
                document.getElementById('transferAmount').value = '';
                await loadUsersList();
            } else throw new Error(res.message);
        } catch(e) { showTxMsg(`Erreur virement: ${e.message}`, 'error'); }
    }

    async function deleteUserById(id) {
        if(!confirm('Supprimer définitivement ce compte ?')) return;
        try {
            const res = await apiFetch(`${API_USERS}/${id}`, { method:'DELETE' });
            if(res.success) {
                await loadUsersList();
                alert('✔️ Utilisateur supprimé');
            } else throw new Error(res.message);
        } catch(e) { alert('Erreur suppression'); }
    }

    // Édition utilisateur
    let currentEditId = null;
    window.openEditUser = (id) => {
        const user = allUsers.find(u => u.id === id);
        if(!user) return;
        currentEditId = id;
        document.getElementById('editName').value = user.name;
        document.getElementById('editEmail').value = user.email;
        document.getElementById('editBalance').value = user.balance;
        document.getElementById('editModal').style.display = 'flex';
    };
    async function saveEdit() {
        if(!currentEditId) return;
        const payload = {
            name: document.getElementById('editName').value.trim(),
            email: document.getElementById('editEmail').value.trim(),
            balance: parseFloat(document.getElementById('editBalance').value) || 0
        };
        if(!payload.name || !payload.email) { alert('Nom et email obligatoires'); return; }
        try {
            const res = await apiFetch(`${API_USERS}/${currentEditId}`, { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload) });
            if(res.success) {
                document.getElementById('editModal').style.display = 'none';
                await loadUsersList();
            } else throw new Error(res.message);
        } catch(e) { alert(`Erreur : ${e.message}`); }
    }

    // historique
    async function showHistory() {
        const userId = document.getElementById('historyUserSelect').value;
        if(!userId) { document.getElementById('historyDisplay').innerHTML = '<div>👤 Choisissez un utilisateur</div>'; return; }
        try {
            const res = await fetch(`${API_USERS}/${userId}/history`).then(r=>r.json());
            if(res.success && res.history) {
                if(!res.history.length) { document.getElementById('historyDisplay').innerHTML = '<div>Aucune transaction 💤</div>'; return; }
                let html = `<h4 style="margin-bottom: 12px;">📋 ${escapeHtml(res.userName)}</h4>`;
                res.history.forEach(t => {
                    const date = new Date(t.date).toLocaleString();
                    let direction = '';
                    if(t.type === 'deposit') direction = '💰 Dépôt';
                    else if(t.type === 'withdraw') direction = '💸 Retrait';
                    else direction = `🔄 Virement ${t.fromUserId == userId ? 'sortant' : 'entrant'}`;
                    html += `<div style="border-left: 4px solid #2c7da0; padding:12px; margin-bottom:12px; background:#f9f9ff; border-radius:20px;">
                                <strong>${direction}</strong> — ${t.amount} €<br>
                                <small>${date}</small><br>
                                <span style="font-size:0.8rem;">${t.description || ''}</span>
                             </div>`;
                });
                document.getElementById('historyDisplay').innerHTML = html;
            } else throw new Error('Echec historique');
        } catch(e) { document.getElementById('historyDisplay').innerHTML = `<div class="error">Erreur: ${e.message}</div>`; }
    }

    // ---------- GESTION ONGLETS ----------
    function activateTab(tabId) {
        document.querySelectorAll('.tab-panel').forEach(panel => panel.classList.remove('active'));
        document.getElementById(`panel-${tabId}`).classList.add('active');
        document.querySelectorAll('.tab').forEach(btn => btn.classList.remove('active'));
        document.querySelector(`.tab[data-tab="${tabId}"]`).classList.add('active');
        if(tabId === 'users') loadUsersList();
        if(tabId === 'transactions') { loadUsersList().then(() => populateUserSelects()); }
        if(tabId === 'history') loadUsersList().then(() => populateUserSelects());
    }

    document.querySelectorAll('.tab').forEach(btn => {
        btn.addEventListener('click', () => activateTab(btn.getAttribute('data-tab')));
    });

    // ---- Événements ----
    document.getElementById('createUserBtn')?.addEventListener('click', createUser);
    document.getElementById('refreshUsersBtn')?.addEventListener('click', loadUsersList);
    document.getElementById('doDepositBtn')?.addEventListener('click', deposit);
    document.getElementById('doWithdrawBtn')?.addEventListener('click', withdraw);
    document.getElementById('doTransferBtn')?.addEventListener('click', transfer);
    document.getElementById('loadHistoryBtn')?.addEventListener('click', showHistory);
    document.getElementById('closeModalBtn')?.addEventListener('click', () => document.getElementById('editModal').style.display = 'none');
    document.getElementById('saveEditBtn')?.addEventListener('click', saveEdit);

    // init
    loadUsersList().then(() => { populateUserSelects(); });
</script>
<style>
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
</style>
</body>
</html>
